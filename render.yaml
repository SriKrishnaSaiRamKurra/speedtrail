services:
  # Backend Express API Service
  - type: web
    name: expense-import-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: expense-import-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  # PostgreSQL Relational Database Instance
  - name: expense-import-db
    plan: free
    postgresMajorVersion: 15
