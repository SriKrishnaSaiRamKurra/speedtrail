version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: spreetail-shared-expenses-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: spreetail_expenses
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spreetail_expenses"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spreetail-shared-expenses-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password123@db:5432/spreetail_expenses?schema=public
      - JWT_SECRET=spreetail_jwt_secret_key_123_abc_xyz
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  # 3. Frontend Client Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: spreetail-shared-expenses-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres_data:
